<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Belleza&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <nav class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">Amber Dawn Ace</a>
      <ul class="nav-links">
        <li><a href="{{ '/about' | relative_url }}"{% if page.url == '/about' or page.url == '/about/' %} class="active"{% endif %}>About me</a></li>
        <li><a href="{{ '/services' | relative_url }}"{% if page.url == '/services' or page.url == '/services/' %} class="active"{% endif %}>Services</a></li>
        <li><a href="{{ '/writing' | relative_url }}"{% if page.url == '/writing' or page.url == '/writing/' %} class="active"{% endif %}>Writing</a></li>
      </ul>
      <a href="{{ '/contact' | relative_url }}" class="btn btn-nav">Contact</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  {% include contact-cta.html %}

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-contact">
        <strong>Contact</strong>
        <a href="mailto:ambace@gmail.com">ambace@gmail.com</a>
        <a href="https://calendly.com/amber-ace/15min" target="_blank" rel="noopener">Calendly</a>
        <a href="https://www.admonymous.co/amber_dawn" target="_blank" rel="noopener">Anonymous feedback</a>
        <a href="{{ '/credits' | relative_url }}">Credits</a>
      </div>
      <div class="footer-social">
        <a href="https://twitter.com/contemplatonist" target="_blank" rel="noopener" aria-label="Twitter">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.261 5.632 5.903-5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </a>
        <a href="https://facebook.com/unnamedelement" target="_blank" rel="noopener" aria-label="Facebook">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </a>
      </div>
    </div>
  </footer>

</body>
</html>
